<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c1017;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #3cd2a5;
            --primary-glow: rgba(60, 210, 165, 0.15);
            --accent: #2188ff;
            --danger: #ff7b72;
            --warning: #d29922;
            --success: #56d364;
            --border: #30363d;
            --font-sans: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section h1 {
            color: var(--primary);
            font-size: 2.2rem;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 0 0 20px var(--primary-glow);
        }

        .logo-section p {
            color: var(--text-muted);
            margin-top: 4px;
            font-size: 1.05rem;
        }

        .stats {
            display: flex;
            gap: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val {
            color: var(--primary);
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 700;
        }

        .stat-lbl {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        input, select {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-color);
            padding: 14px 18px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .routes-table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(22, 27, 34, 0.8);
            border-bottom: 2px solid var(--border);
            padding: 16px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-get {
            background-color: rgba(86, 211, 100, 0.15);
            color: var(--success);
            border: 1px solid rgba(86, 211, 100, 0.3);
        }

        .badge-post {
            background-color: rgba(33, 136, 255, 0.15);
            color: var(--accent);
            border: 1px solid rgba(33, 136, 255, 0.3);
        }

        .badge-put-patch {
            background-color: rgba(210, 153, 34, 0.15);
            color: var(--warning);
            border: 1px solid rgba(210, 153, 34, 0.3);
        }

        .badge-delete {
            background-color: rgba(255, 123, 114, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 123, 114, 0.3);
        }

        .badge-other {
            background-color: rgba(139, 148, 158, 0.15);
            color: var(--text-muted);
            border: 1px solid rgba(139, 148, 158, 0.3);
        }

        .route-uri {
            font-family: var(--font-mono);
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .route-uri:hover {
            color: #fff;
            text-decoration: underline;
        }

        .route-name {
            font-family: var(--font-mono);
            color: #58a6ff;
            font-size: 0.85rem;
        }

        .route-action {
            color: var(--text-muted);
            font-size: 0.85rem;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .middleware-list {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .mw-badge {
            background-color: rgba(48, 54, 61, 0.6);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <h1>🤖 ELASTICCOST</h1>
                <p>Routing Map — Web & API Directory</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-val" id="total-routes">0</div>
                    <div class="stat-lbl">Total Routes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="web-routes">0</div>
                    <div class="stat-lbl">Web Routes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="api-routes">0</div>
                    <div class="stat-lbl">API Routes</div>
                </div>
            </div>
        </header>

        <div class="controls">
            <input type="text" id="search" placeholder="Search URI, Name, Action, or Middleware...">
            <select id="type-filter">
                <option value="all">All Routes</option>
                <option value="web">Web Only</option>
                <option value="api">API Only</option>
            </select>
            <select id="method-filter">
                <option value="all">All Methods</option>
                <option value="GET">GET / HEAD</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT / PATCH</option>
                <option value="DELETE">DELETE</option>
            </select>
        </div>

        <div class="routes-table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 12%">Method</th>
                        <th style="width: 33%">URI / Path</th>
                        <th style="width: 20%">Route Name</th>
                        <th style="width: 20%">Action</th>
                        <th style="width: 15%">Middleware</th>
                    </tr>
                </thead>
                <tbody id="routes-body">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>

        const routesBody = document.getElementById('routes-body');
        const searchInput = document.getElementById('search');
        const typeFilter = document.getElementById('type-filter');
        const methodFilter = document.getElementById('method-filter');

        // Statistics elements
        const totalRoutesEl = document.getElementById('total-routes');
        const webRoutesEl = document.getElementById('web-routes');
        const apiRoutesEl = document.getElementById('api-routes');

        function getMethodBadgeClass(methods) {
            const m = methods.toUpperCase();
            if (m.includes('GET')) return 'badge-get';
            if (m.includes('POST')) return 'badge-post';
            if (m.includes('PUT') || m.includes('PATCH')) return 'badge-put-patch';
            if (m.includes('DELETE')) return 'badge-delete';
            return 'badge-other';
        }

        function renderRoutes() {
            const query = searchInput.value.toLowerCase();
            const type = typeFilter.value;
            const method = methodFilter.value;

            let filtered = routes.filter(route => {
                // Search match
                const matchSearch = 
                    route.uri.toLowerCase().includes(query) ||
                    (route.name && route.name.toLowerCase().includes(query)) ||
                    route.action.toLowerCase().includes(query) ||
                    route.middleware.some(mw => mw.toLowerCase().includes(query));

                // Type match (API routes start with api/ or have api middleware)
                const isApi = route.uri.startsWith('api') || route.middleware.includes('api');
                const matchType = 
                    type === 'all' ||
                    (type === 'web' && !isApi) ||
                    (type === 'api' && isApi);

                // Method match
                const matchMethod = 
                    method === 'all' ||
                    route.method.toUpperCase().includes(method);

                return matchSearch && matchType && matchMethod;
            });

            // Update stats
            let webCount = 0;
            let apiCount = 0;
            routes.forEach(route => {
                const isApi = route.uri.startsWith('api') || route.middleware.includes('api');
                if (isApi) apiCount++;
                else webCount++;
            });

            totalRoutesEl.textContent = routes.length;
            webRoutesEl.textContent = webCount;
            apiRoutesEl.textContent = apiCount;

            routesBody.innerHTML = '';
            
            if (filtered.length === 0) {
                routesBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 30px;">No routes matched the selected criteria.</td></tr>`;
                return;
            }

            filtered.forEach(route => {
                const methodBadge = `<span class="badge ${getMethodBadgeClass(route.method)}">${route.method}</span>`;
                
                // Construct relative URL for linking if it is GET
                const isGet = route.method.toUpperCase().includes('GET');
                const routeUriLink = isGet && !route.uri.includes('{') 
                    ? `<a href="/${route.uri}" target="_blank" class="route-uri">/${route.uri}</a>`
                    : `<span class="route-uri" style="cursor: default;">/${route.uri}</span>`;

                const routeName = route.name ? `<span class="route-name">${route.name}</span>` : '<span style="color: var(--text-muted); font-style: italic;">None</span>';
                
                // Clean action name
                const action = route.action.replace('App\\Http\\Controllers\\', '');
                
                // Middleware list
                const mwHtml = route.middleware.map(mw => {
                    const cleanMw = mw.replace('Illuminate\\Auth\\Middleware\\', 'Auth:')
                                      .replace('App\\Http\\Middleware\\', '');
                    return `<span class="mw-badge">${cleanMw}</span>`;
                }).join('');

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${methodBadge}</td>
                    <td>${routeUriLink}</td>
                    <td>${routeName}</td>
                    <td><span class="route-action" title="${route.action}">${action}</span></td>
                    <td><div class="middleware-list">${mwHtml}</div></td>
                `;
                routesBody.appendChild(row);
            });
        }

        // Add event listeners
        searchInput.addEventListener('input', renderRoutes);
        typeFilter.addEventListener('change', renderRoutes);
        methodFilter.addEventListener('change', renderRoutes);

        // Initial render
        renderRoutes();
    </script>
