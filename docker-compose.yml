services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elasticcost-app
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: app
    env_file:
      - .env
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elasticcost-network

  web:
    image: nginx:alpine
    container_name: elasticcost-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - storage_data:/var/www/storage
    depends_on:
      - app
    networks:
      - elasticcost-network

  postgres:
    image: postgres:17-alpine
    container_name: elasticcost-db


    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-elasticcost}
      POSTGRES_USER: ${DB_USERNAME:-elasticcost}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-elasticcost} -d ${DB_DATABASE:-elasticcost}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elasticcost-network

  redis:
    image: redis:7-alpine
    container_name: elasticcost-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - elasticcost-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elasticcost-worker
    restart: unless-stopped
    command: php artisan horizon
    env_file:
      - .env
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elasticcost-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elasticcost-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elasticcost-network

  pulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elasticcost-pulse
    restart: unless-stopped
    command: php artisan pulse:work
    env_file:
      - .env
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elasticcost-network

  octane:
    build:
      context: .
      dockerfile: Dockerfile.octane
    container_name: elasticcost-octane
    restart: unless-stopped
    command: php artisan octane:frankenphp --host=0.0.0.0 --port=8000 --max-requests=500
    env_file:
      - .env
    ports:
      - "8001:8000"
    volumes:
      - .:/var/www
      - storage_data:/var/www/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elasticcost-network

networks:
  elasticcost-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
